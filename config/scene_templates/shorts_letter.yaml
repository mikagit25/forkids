  - {label: "C", choreo: carousel,    duration: 12, n: 1, text: "C", sub_text: "Cat",      voiceover_key: "C", chars: []}
  - {label: "D", choreo: zigzag,      duration: 12, n: 1, text: "D", sub_text: "Dog",      voiceover_key: "D", chars: []}
  - {label: "E", choreo: grid_sway,   duration: 12, n: 1, text: "E", sub_text: "Elephant", voiceover_key: "E", chars: []}
