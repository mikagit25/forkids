# ─────────────────────────────────────────────────────────────
# Scene template for Happy Bear Kids — default 30-min episode
# ─────────────────────────────────────────────────────────────
#
# Each entry in `scenes` repeats in order and then loops.
# Fields:
#   label       – human name (for logs and debugging)
#   choreo      – movement type:
#                   grid_bounce   - 2×2 grid, wave-bounce on beat
#                   grid_sway     - 2×2 grid, mirror sway left-right
#                   carousel      - rotating ellipse (perspective scale)
#                   parade        - march left → right, looping
#                   line_h        - horizontal row, wave bounce
#                   diagonal_in   - enter from corners → grid, then bounce
#                   zigzag        - sine-wave paths, each char different phase
#   duration    – scene length in seconds
#   n           – number of characters on screen
#   entry       – optional: how chars appear
#                   cascade  (default) - one by one, 0.25s apart
#                   together           - all at once
#                   left_to_right      - slot order left→right
#   chars       – optional: specific character names, or omit for auto

scenes:
  # ── ACT 1: WELCOME ─────────────────────────────────────────
  - label: "Entrance — Diagonal"
    choreo: diagonal_in
    duration: 38
    n: 4
    entry: left_to_right

  - label: "Grid Dance — Bounce"
    choreo: grid_bounce
    duration: 42
    n: 4

  - label: "Grid Dance — Sway"
    choreo: grid_sway
    duration: 38
    n: 4

  # ── ACT 2: MOVEMENT ─────────────────────────────────────────
  - label: "Carousel — 4 chars"
    choreo: carousel
    duration: 52
    n: 4

  - label: "Parade — 3 march"
    choreo: parade
    duration: 45
    n: 3

  - label: "Horizontal Wave — 5 chars"
    choreo: line_h
    duration: 40
    n: 5
    entry: left_to_right

  # ── ACT 3: VARIETY ──────────────────────────────────────────
  - label: "Zigzag — 4 chars"
    choreo: zigzag
    duration: 42
    n: 4

  - label: "Grid — Bounce 3"
    choreo: grid_bounce
    duration: 35
    n: 3

  - label: "Carousel — 3 spin"
    choreo: carousel
    duration: 50
    n: 3

  - label: "Parade — 4 march"
    choreo: parade
    duration: 48
    n: 4

  # ── ACT 4: BIG WAVE ─────────────────────────────────────────
  - label: "Line Wave — 4"
    choreo: line_h
    duration: 38
    n: 4

  - label: "Diagonal In — 4"
    choreo: diagonal_in
    duration: 40
    n: 4

  - label: "Grid Sway — 4"
    choreo: grid_sway
    duration: 40
    n: 4

  - label: "Carousel — 5 spin"
    choreo: carousel
    duration: 55
    n: 5

  # ── ACT 5: FINALE LOOP ──────────────────────────────────────
  - label: "Zigzag — 3"
    choreo: zigzag
    duration: 38
    n: 3

  - label: "Parade — Big 4"
    choreo: parade
    duration: 50
    n: 4

  - label: "Grid Bounce — 5"
    choreo: grid_bounce
    duration: 38
    n: 5

  - label: "Carousel — Grand"
    choreo: carousel
    duration: 55
    n: 4
