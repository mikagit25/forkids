# ─────────────────────────────────────────────────────────────
# Scene template for Happy Bear Kids — default 30-min episode
# ─────────────────────────────────────────────────────────────
#
# Each entry in `scenes` repeats in order and then loops.
# Fields:
#   label       – human name (for logs and debugging)
#   choreo      – movement type:
#                   grid_bounce   - 2×2 grid, wave-bounce on beat
#                   grid_sway     - 2×2 grid, mirror sway left-right
#                   carousel      - rotating ellipse (perspective scale)
#                   parade        - march left → right, looping
#                   line_h        - horizontal row, wave bounce
#                   diagonal_in   - enter from corners → grid, then bounce
#                   zigzag        - sine-wave paths, each char different phase
#   duration    – scene length in seconds
#   n           – number of characters on screen
#   entry       – optional: how chars appear
#                   cascade  (default) - one by one, 0.25s apart
#                   together           - all at once
#                   left_to_right      - slot order left→right
#   chars       – optional: specific character names, or omit for auto

scenes:
  # ── BLOCK 1: Открытие ───────────────────────────────────────
  - label: "Entrance — Diagonal"
    choreo: diagonal_in
    duration: 24
    n: 4
    entry: left_to_right

  - label: "Carousel — Round 4"
    choreo: carousel
    duration: 28
    n: 4

  - label: "Parade — March 3"
    choreo: parade
    duration: 26
    n: 3

  # ── BLOCK 2: Волна ──────────────────────────────────────────
  - label: "Line Wave — 4"
    choreo: line_h
    duration: 24
    n: 4
    entry: left_to_right

  - label: "Grid Bounce — 4"
    choreo: grid_bounce
    duration: 22
    n: 4

  - label: "Zigzag — 4"
    choreo: zigzag
    duration: 28
    n: 4

  # ── BLOCK 3: Смена ──────────────────────────────────────────
  - label: "Grid Sway — 4"
    choreo: grid_sway
    duration: 22
    n: 4

  - label: "Carousel — 3 spin"
    choreo: carousel
    duration: 26
    n: 3

  - label: "Parade — 4 march"
    choreo: parade
    duration: 28
    n: 4

  # ── BLOCK 4: Разнообразие ────────────────────────────────────
  - label: "Line Wave — 5"
    choreo: line_h
    duration: 24
    n: 5
    entry: left_to_right

  - label: "Diagonal In — 4"
    choreo: diagonal_in
    duration: 24
    n: 4

  - label: "Zigzag — 3"
    choreo: zigzag
    duration: 26
    n: 3

  # ── BLOCK 5: Финал-петля ─────────────────────────────────────
  - label: "Grid Bounce — 3"
    choreo: grid_bounce
    duration: 22
    n: 3

  - label: "Carousel — 5 grand"
    choreo: carousel
    duration: 30
    n: 5

  - label: "Parade — Big 4"
    choreo: parade
    duration: 26
    n: 4

  - label: "Grid Sway — 3"
    choreo: grid_sway
    duration: 22
    n: 3

  - label: "Line Wave — 3"
    choreo: line_h
    duration: 24
    n: 3

  - label: "Zigzag — 5"
    choreo: zigzag
    duration: 28
    n: 5
