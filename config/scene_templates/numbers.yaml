# ─────────────────────────────────────────────────────────────
# Scene template — Numbers 1 to 10
# Each scene shows the digit + N characters + voiceover
# ─────────────────────────────────────────────────────────────

scenes:
  - label: "1 - One"
    choreo: diagonal_in
    duration: 10
    n: 1
    text: "1"
    sub_text: "One"
    voiceover_key: "1"
    bg_color: "#FF6B6B"
    chars: []

  - label: "2 - Two"
    choreo: line_h
    duration: 10
    n: 2
    text: "2"
    sub_text: "Two"
    voiceover_key: "2"
    bg_color: "#FF922B"
    chars: []

  - label: "3 - Three"
    choreo: grid_bounce
    duration: 10
    n: 3
    text: "3"
    sub_text: "Three"
    voiceover_key: "3"
    bg_color: "#FFD93D"
    chars: []

  - label: "4 - Four"
    choreo: carousel
    duration: 10
    n: 4
    text: "4"
    sub_text: "Four"
    voiceover_key: "4"
    bg_color: "#6BCB77"
    chars: []

  - label: "5 - Five"
    choreo: line_h
    duration: 10
    n: 5
    text: "5"
    sub_text: "Five"
    voiceover_key: "5"
    bg_color: "#4D96FF"
    chars: []

  - label: "6 - Six"
