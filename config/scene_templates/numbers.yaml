    duration: 10
    n: 4
    text: "6"
    sub_text: "Six"
    voiceover_key: "6"
    bg_color: "#A29BFE"
    chars: []

  - label: "7 - Seven"
    choreo: zigzag
    duration: 10
    n: 4
    text: "7"
    sub_text: "Seven"
    voiceover_key: "7"
    bg_color: "#FD79A8"
    chars: []

  - label: "8 - Eight"
    choreo: parade
    duration: 10
    n: 4
    text: "8"
    sub_text: "Eight"
    voiceover_key: "8"
    bg_color: "#55EFC4"
