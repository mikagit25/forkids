# ─────────────────────────────────────────────────────────────
# Weekly content plan for Happy Bear Kids
# Run: python3 scripts/batch_generate.py --plan config/weekly_plan.yaml
# ─────────────────────────────────────────────────────────────
#
# video_type:
#   dance    - animated characters with music, multiple choreographies
#   abc      - A-Z educational video with voiceover
#   numbers  - 1-20 counting video (TODO: Phase 4)
#   colors   - colors learning video (TODO: Phase 4)
#
# theme: animals | fruits
# duration_minutes: video length

videos:
