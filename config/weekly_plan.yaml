# ─────────────────────────────────────────────────────────────
# Weekly content plan for Happy Bear Kids
# Run: python3 scripts/batch_generate.py --plan config/weekly_plan.yaml
# Max 6 uploads/day on a new channel: 2 long + 4 shorts
# ─────────────────────────────────────────────────────────────
#
# video_type:
#   dance        - animated characters with music (long, 30min)
#   abc          - A-Z alphabet video with voiceover (long, 6min)
#   numbers      - 1-10 counting (long, 2min)
#   colors       - learn colors (long, 2min)
#   short_letter - 5 letters Short (60s vertical)
#   short_number - count 1-5 Short (60s vertical)
#   short_color  - 4 colors Short (60s vertical)
#   short_shape  - 4 shapes Short (60s vertical)
#   short_dance  - dance clip Short (60s vertical)
#
# is_shorts: true forces vertical 720x1280 rendering
# ─────────────────────────────────────────────────────────────

videos:
  # ── MONDAY ────────────────────────────────────────────────
