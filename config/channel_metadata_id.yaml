# ─────────────────────────────────────────────────────────────
# YouTube Channel Metadata — Happy Bear Kids INDONESIA
# Bahasa Indonesia channel — fill handle/ID after channel creation
# ─────────────────────────────────────────────────────────────

channel:
  name: "Happy Bear Kids Indonesia"
  handle: "@happybearkidsin"
  youtube_id: "UCOozTZwjXgkfYiTAzSzePAA"

  description: |
    🐻 Selamat datang di Happy Bear Kids Indonesia — dunia belajar yang menyenangkan untuk bayi dan balita!

    Kami membuat video edukatif yang cerah dan ceria untuk anak usia 0–5 tahun:
    🔤 Alfabet ABC — belajar setiap huruf dengan hewan lucu
    🔢 Angka — hitung dari 1 sampai 10 bersama teman berwarna-warni
    🎨 Warna — merah, biru, kuning, hijau, dan lainnya!
    ⭐ Bentuk — lingkaran, kotak, segitiga, dan bintang
    🎵 Lagu Anak — lagu-lagu populer Indonesia dengan karakter kartun yang menari

    Setiap video dirancang aman, menenangkan, dan menarik untuk si kecil. Tanpa iklan yang menggangu, tanpa konten menakutkan — hanya kegembiraan dan pembelajaran murni!

    🔔 Subscribe dan jangan lewatkan video baru!
    Video baru setiap Senin, Selasa dan Rabu pukul 09:00.

    Dibuat dengan penuh cinta untuk si kecil. 🐻💛

  keywords: >
    belajar anak, video bayi, edukasi balita, alfabet untuk anak,
    lagu alfabet, angka untuk anak, warna untuk balita, bentuk untuk anak,
    lagu anak indonesia, balonku, cicak-cicak, pelangi-pelangi, naik kereta api,
    video edukasi, happy bear kids, belajar bahasa indonesia, kartun anak,
    prasekolah, video sensori anak, musik anak, bayi, balita

  country: "ID"
  language: "id"
  made_for_kids: true
  links: []
  trailer_video_id: ""

