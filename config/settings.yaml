channel:
  name: "Happy Bear Kids"
  language: "en"
  default_duration_minutes: 30
  videos_per_day: 2
  upload_times: ["09:00", "18:00"]

video:
  resolution: [1920, 1080]
  fps: 30
  watermark: "assets/logo.png"
  background_colors:
    - "#FF6B6B"
    - "#FFD93D"
    - "#6BCB77"
    - "#4D96FF"
    - "#FF922B"
    - "#A29BFE"
    - "#FD79A8"
    - "#55EFC4"

animation:
  sprite_size: 520
  bounce_height: 55
  sway_angle: 18
  pulse_scale: 0.15
  sprites_on_screen: 1
  group_change_interval: [35, 40]   # seconds per animal
  sprites_dir: "assets/sprites_new"

  # Light pastel backgrounds (TutiTuTV style)
  background_colors_dance:
    - "#FFF9E6"   # warm cream
    - "#E8F5E9"   # mint
    - "#E3F2FD"   # sky blue
    - "#FCE4EC"   # rose
    - "#F3E5F5"   # lavender
    - "#E0F7FA"   # aqua
    - "#FFFDE7"   # lemon
    - "#F9FBE7"   # lime cream

music:
  source: "local"
  loop_dir: "assets/music/"

youtube:
  credentials: "credentials/youtube_client.json"
  token: "credentials/token.pickle"
  default_status: "public"
  title_template: "Dancing {theme} 🎵 Happy Music for Kids | {channel_name}"
